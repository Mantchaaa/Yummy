<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Mobile</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&family=Varela+Round&display=swap" rel="stylesheet">
    <style>
        /* --- CSS DASAR --- */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { height: 100%; width: 100%; overflow: hidden; background-color: #D1B3FF; font-family: 'Quicksand', sans-serif; }
        .background-container { width: 100%; height: 100vh; position: relative; overflow: hidden; }
        .gradient-canvas {
            position: absolute; top: -70%; left: -70%; width: 240%; height: 240%;
            background-image: radial-gradient(at 10% 20%, #A8E6FF 0%, transparent 45%), radial-gradient(at 80% 30%, #D1B3FF 0%, transparent 55%), radial-gradient(at 50% 50%, #FFB3D9 0%, transparent 55%), radial-gradient(at 20% 80%, #A8E6FF 0%, transparent 45%), radial-gradient(at 90% 90%, #D1B3FF 0%, transparent 50%);
            filter: blur(50px); animation: fluidMove 8s ease-in-out infinite alternate;
        }
        @keyframes fluidMove { 0% { transform: translate(0, 0) rotate(0deg); } 100% { transform: translate(15%, 15%) rotate(15deg); } }

        /* --- BACKGROUND STARS --- */
        .stars-container { position: absolute; width: 100%; height: 100%; top: 0; left: 0; pointer-events: none; z-index: 1; }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.5; animation: twinkle var(--d) infinite; }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 0.8; transform: scale(1.2); } }

        /* --- LOVE JATUH ABSTRAK --- */
        .falling-love { position: absolute; top: -50px; pointer-events: none; z-index: 15; animation: fall var(--t) linear forwards; filter: drop-shadow(0 0 5px rgba(255,255,255,0.5)); }
        @keyframes fall { 0% { transform: translateY(0) translateX(0) rotate(0deg); opacity: 1; } 25% { transform: translateY(25vh) translateX(30px) rotate(90deg); } 50% { transform: translateY(50vh) translateX(-30px) rotate(180deg); } 100% { transform: translateY(110vh) translateX(0) rotate(360deg); opacity: 0; } }

        /* --- TOP NAVBAR --- */
        .top-navbar-ui {
            position: absolute; top: 0; left: 0; width: 100%; height: 70px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; z-index: 100;
            background: rgba(255, 255, 255, 0.3); backdrop-filter: blur(8px);
        }
        .music-icons { display: flex; gap: 15px; align-items: center; }
        .music-btn { background: none; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .music-btn svg { width: 22px; height: 22px; fill: #D1B3FF; }

        /* --- HOME ELEMENTS --- */
        .text-container { position: absolute; top: 120px; width: 100%; text-align: center; z-index: 10; transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.5s; opacity: 0; transform: translateY(100vh); }
        .text-container.active { opacity: 1; transform: translateY(0); }
        .text-container h1 { color: white; font-size: 26px; font-family: 'Varela Round', sans-serif; text-shadow: 2px 2px 4px rgba(0,0,0,0.1); }
        .iphone-frame-container { position: absolute; top: 200px; left: 50%; width: 280px; z-index: 5; transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.5s; transform: translate(-50%, 100vh); opacity: 0; }
        .iphone-frame-container.active { transform: translate(-50%, 0); opacity: 1; }

        /* --- GALLERY --- */
        .gallery-container {
            position: absolute; top: 70px; width: 100%; height: calc(100vh - 110px);
            padding: 0 15px; overflow-y: auto; display: none; opacity: 0;
            transition: opacity 0.5s ease; scrollbar-width: none; z-index: 12;
        }
        .gallery-container::-webkit-scrollbar { display: none; }
        .gallery-grid { column-count: 2; column-gap: 10px; padding-bottom: 90px; }
        .gallery-item { margin-bottom: 20px; break-inside: avoid; border-radius: 15px; overflow: hidden; background: rgba(255,255,255,0.2); cursor: pointer; transition: transform 0.3s; }
        .gallery-item img { width: 100%; height: auto; display: block; }
        .zoomed { position: fixed !important; top: 0; left: 0; width: 100vw !important; height: 100vh !important; z-index: 999; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; backdrop-filter: blur(10px); animation: zoomIn 0.3s ease; }
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }

        /* --- GAME SECTION --- */
        .game-container { position: absolute; top: 180px; width: 100%; height: calc(100vh - 280px); padding: 20px; display: none; opacity: 0; z-index: 12; transform: translateY(100vh); transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .game-container.active { display: block; opacity: 1; transform: translateY(0); }
        .game-card { background: rgba(255, 255, 255, 0.5); padding: 15px; border-radius: 20px; display: flex; align-items: center; gap: 15px; text-decoration: none; color: #7a5ba3; margin-bottom: 15px; backdrop-filter: blur(5px); }

        /* --- BOTTOM NAV --- */
        .nav-wrapper { position: absolute; bottom: 0; width: 100%; height: 100px; display: flex; justify-content: center; align-items: flex-end; z-index: 110; }
        .bottom-nav { width: 2000%; height: 120px; background: white; box-shadow: 10px 10px 20px rgba(0, 0, 0, 0.5); display: flex; justify-content: space-around; align-items: center; position: relative; border-radius: 30px 30px 0 0; }
        .love-indicator { position: absolute; bottom: -5px; width: 24px; height: 70px; box-shadow: 10px 10px 20px rgba(0, 0, 0, 0.5); background: linear-gradient(1350deg, #FFB3D9, #D1B3FF); clip-path: path('M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z'); display: flex; justify-content: center; align-items: center; transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 20; transform: scale(3.5); }
        .love-text { position: absolute; transform: scale(0.3); text-align: center; top: 5px; font-size: 9px; color: white; font-weight: bold; }
        
        .nav-item { width: 99.33%; height: 100px; display: flex; justify-content: center; align-items: center; z-index: 30; cursor: pointer; transition: opacity 0.3s; }
        .nav-item svg { width: 120px; height: 40px; stroke: #D1B3FF;
          fill: none; stroke-width: 2; transition: 0.9s; }
        
        /* Class supaya ikon sembunyi saat aktif */
        .nav-item.active-hide { opacity: 0; pointer-events: none; }

    </style>
</head>
<body>

    <audio id="myAudio" loop><source src="Nadhif.mp3" type="audio/mpeg"></audio>

    <div class="background-container">
        <div class="gradient-canvas"></div>
        <div class="stars-container" id="starsContainer"></div>

        <div class="top-navbar-ui">
            <button class="music-btn" onclick="moveNav(1, 'HOME')"><svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg></button>
            <div class="music-icons">
                <button class="music-btn" onclick="stopAudio()"><svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg></button>
                <button class="music-btn" onclick="prevAudio()"><svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
                <button class="music-btn" onclick="togglePlay()"><svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></button>
                <button class="music-btn" onclick="nextAudio()"><svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
                <button class="music-btn" onclick="shuffleAudio()"><svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg></button>
            </div>
        </div>

        <div id="textContainer" class="text-container"><h1 id="titleText">Hai, selamat datang<br>di website Mantcaa</h1></div>
        <div id="phoneFrame" class="iphone-frame-container"><img src="fream6.png" style="width: 100%;" alt="Frame"></div>

        <div id="gallerySection" class="gallery-container">
            <div class="gallery-grid">
                <div class="gallery-item" onclick="zoomImg(this)"><img src="https://picsum.photos/400/600?random=1"></div>
                <div class="gallery-item" onclick="zoomImg(this)"><img src="https://picsum.photos/400/400?random=2"></div>
                <div class="gallery-item" onclick="zoomImg(this)"><img src="https://picsum.photos/400/700?random=3"></div>
                <div class="gallery-item" onclick="zoomImg(this)"><img src="https://picsum.photos/400/500?random=4"></div>
                <div class="gallery-item" onclick="zoomImg(this)"><img src="https://picsum.photos/400/800?random=5"></div>
                <div class="gallery-item" onclick="zoomImg(this)"><img src="https://picsum.photos/400/600?random=6"></div>
            </div>
        </div>

        <div id="gameSection" class="game-container">
            <div class="game-list">
                <a href="#" target="_blank" class="game-card"><img src="https://picsum.photos/60/60?random=10" style="border-radius:10px"><div><h3>Game Seru 1</h3><p>Klik buat main</p></div></a>
                <a href="#" target="_blank" class="game-card"><img src="https://picsum.photos/60/60?random=11" style="border-radius:10px"><div><h3>Game Seru 2</h3><p>Coming Soon</p></div></a>
            </div>
        </div>

        <div class="nav-wrapper">
            <div class="bottom-nav">
                <div id="curve" class="nav-curve"></div>
                <div id="love" class="love-indicator"><div id="label" class="love-text">HOME</div></div>
                <div class="nav-item" onclick="moveNav(0, 'GALLERY')"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg></div>
                <div class="nav-item" onclick="moveNav(1, 'HOME')"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div>
                <div class="nav-item" onclick="moveNav(2, 'GAME')"><svg viewBox="0 0 24 24"><path d="M6 12h4M8 10v4M15 11h.01M18 13h.01M15 13h.01M18 11h.01M4 8h16a2 2 0 0 1 2 2v4a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2v-4a2 2 0 0 1 2-2z"/></svg></div>
            </div>
        </div>
    </div>

    <script>
        var audio = document.getElementById("myAudio");
        var isPlaying = false;
        var currentMenu = '';
        var loveTimer;

        function togglePlay() {
            const playIcon = document.getElementById("playIcon");
            if (isPlaying) { audio.pause(); playIcon.innerHTML = '<path d="M8 5v14l11-7z"/>'; } 
            else { audio.play(); playIcon.innerHTML = '<path d="M6 6h12v12H6z"/>'; }
            isPlaying = !isPlaying;
        }
        function stopAudio() { audio.pause(); audio.currentTime = 0; isPlaying = false; document.getElementById("playIcon").innerHTML = '<path d="M8 5v14l11-7z"/>'; }
        function nextAudio() { console.log("Next"); }
        function prevAudio() { console.log("Prev"); }
        function shuffleAudio() { console.log("Shuffle"); }

        function createStars() {
            const container = document.getElementById('starsContainer');
            for(let i=0; i<30; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.width = star.style.height = (Math.random() * 5 + 2) + 'px';
                star.style.left = Math.random() * 100 + '%'; star.style.top = Math.random() * 100 + '%';
                star.style.setProperty('--d', (Math.random() * 3 + 2) + 's');
                container.appendChild(star);
            }
        }

        function createFallingLove() {
            if(currentMenu !== 'HOME') return;
            const items = ['💐', '💖', '✨', '🌸', '☁️', '💎', '💞',];
            const heart = document.createElement('div');
            heart.className = 'falling-love';
            heart.innerHTML = items[Math.floor(Math.random() * items.length)];
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.fontSize = (Math.random() * 15 + 15) + 'px';
            heart.style.setProperty('--t', (Math.random() * 2 + 4) + 's');
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 6000);
        }

        function zoomImg(el) { el.classList.toggle('zoomed'); }

        function moveNav(index, name) {
            if (currentMenu === name) return;
            currentMenu = name;
            
            const love = document.getElementById('love');
            const curve = document.getElementById('curve');
            const label = document.getElementById('label');
            const phone = document.getElementById('phoneFrame');
            const textCont = document.getElementById('textContainer');
            const gallery = document.getElementById('gallerySection');
            const gameSect = document.getElementById('gameSection');
            const navItems = document.querySelectorAll('.nav-item');
            const positions = ['16.66%', '50%', '83.33%'];

            // Geser Indikator
            love.style.left = `calc(${positions[index]} - 10px)`;
            curve.style.left = `calc(${positions[index]} - 1px)`;
            label.innerText = name;

            // Logic sembunyiin ikon pas menu dipilih
            navItems.forEach(item => item.classList.remove('active-hide'));
            navItems[index].classList.add('active-hide');

            phone.classList.remove('active');
            textCont.classList.remove('active');
            gallery.style.opacity = "0";
            gameSect.classList.remove('active');

            setTimeout(() => {
                gallery.style.display = "none";
                gameSect.style.display = "none";
                if(name === 'HOME') {
                    phone.classList.add('active');
                    textCont.classList.add('active');
                    if(!loveTimer) loveTimer = setInterval(createFallingLove, 600);
                } else {
                    clearInterval(loveTimer); loveTimer = null;
                    if(name === 'GALLERY') {
                        gallery.style.display = "block";
                        setTimeout(() => gallery.style.opacity = "1", 50);
                    } else if(name === 'GAME') {
                        gameSect.style.display = "block";
                        setTimeout(() => gameSect.classList.add('active'), 50);
                    }
                }
            }, 500);
        }

        window.onload = () => { createStars(); moveNav(1, 'HOME'); };
    </script>
</body>
</html>
